<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="CSS/style.css" />

    <title>Calculadora por Voz</title>
</head>

<body>
    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
        <!-- "card" da calculadora -->
        <div class="voice-calc text-center rounded-4 shadow-lg p-4 p-md-5">
            <div id="status" class="status-text text-uppercase mb-3">
                Toque no microfone e fale
            </div>
            <!-- área de exibição -->
            <div class="display-box rounded-4 p-4 mb-4">
                <!-- mostra o que foi falado -->
                <div id="spokenText" class="spoken-text mb-3">
                    Você falou: —
                </div>
                <!-- resultado -->
                <div id="display" class="display-text">
                    0
                </div>
            </div>
            <!-- botão do microfone -->
            <button id="mic-btn"
                class="btn mic-btn d-flex align-items-center justify-content-center gap-2 position-relative mx-auto"
                onclick="startListening()">

                <span class="mic-icon">🎤</span>
                <span class="btn-text">Falar</span>
                <span class="pulse-ring"></span>
            </button>
        </div>
    </div>
    <script src="JS/script.js"></script>
</body>

</html>
