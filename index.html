<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Calculadora por voz acessível, fácil de usar e com suporte a modo claro e escuro.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="CSS/style.css" />

    <title>Calculadora por Voz</title>
</head>

<body>
    <button type="button" class="contrast-btn" onclick="toggleTheme()" title="Alternar tema" aria-label="Alternar tema">
        Contraste
        <i class="bi bi-circle-half"></i>
    </button>
    <main class="container min-vh-100 d-flex justify-content-center align-items-center">
        <h1 class="visually-hidden">Calculadora por voz acessível</h1>

        <!-- calculadora -->
        <div class="voice-calc text-center rounded-4 shadow-lg p-4 p-md-5">
            <div id="status" class="status-text text-uppercase mb-3" role="status" aria-live="polite">
                Toque no microfone e fale
            </div>
            <!-- área de exibição -->
            <div class="display-box rounded-4 p-4 mb-4">
                <!-- mostra o que foi falado -->
                <div id="spokenText" class="spoken-text mb-3" aria-live="polite">
                    Você falou: —
                </div>
                <!-- resultado -->
                <div id="display" class="display-text" aria-live="assertive" aria-atomic="true">
                    0
                </div>
            </div>
            <!-- botão do microfone -->
            <button type="button" id="mic-btn"
                class="btn mic-btn d-flex align-items-center justify-content-center gap-2 position-relative mx-auto"
                onclick="startListening()" aria-label="Iniciar reconhecimento de voz" aria-pressed="false">

                <span class="mic-icon"><i class="bi bi-mic-fill"></i></span>
                <span class="btn-text">Falar</span>
                <span class="pulse-ring"></span>
            </button>
        </div>
    </main>
    <!-- plugin de libras do governo pra acessibilidade -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

    <script src="JS/script.js"></script>
</body>

</html>
